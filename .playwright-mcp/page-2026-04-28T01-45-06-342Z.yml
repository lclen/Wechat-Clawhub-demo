                - generic [ref=e273]: "**E048 故障代码通常表示：充电模块通信故障（或模块离线）。** 这意味着充电桩主控板无法与一个或多个充电模块建立正常的 CAN 通信连接，导致模块无法启动或受控。 请按照以下步骤进行排查： ### 1. 检查 CAN 通信线路（最常见原因） * **接线方式**：确认模块 CAN 线是否采用**“手拉手”**（串联）方式连接，严禁星型或并联连接。 * **终端电阻**：检查 CAN 总线两端（主板端和最后一个模块端）是否各有一个 **120Ω** 的终端电阻。测量 CAN+ 与 CAN- 之间的阻值，正常应在 60Ω-120Ω 之间（取决于模块数量）。 * **接线质量**：检查 CAN 线（CAN_H/CAN_L）是否接反、松动或断路。**必须使用屏蔽双绞线**，且屏蔽层需单端可靠接地，以防止大电流充电时的电磁干扰。 ### 2. 检查模块供电与状态 * **模块供电**：确认所有充电模块的辅助电源（通常为 12V/24V）和交流输入（380V/220V）是否正常。如果模块未上电，自然无法通信。 * **模块指示灯**：观察模块面板上的通信指示灯（如有）或保护/故障灯。如果模块报内部故障（如过温、过压），也可能导致通信中断。 * **地址冲突**：如果是多模块系统，检查模块的地址拨码或设置是否唯一，避免地址冲突。 ### 3. 检查主板配置与程序 * **协议匹配**：进入“厂家设置”或“模块参数设置”，确认选择的**模块通信协议**（如英飞源 105/5, 华为 103, 中兴 212 等）与实际使用的模块品牌型号完全一致。 * **模块数量**：确认主板设置的模块数量与实际安装数量一致。 * **程序版本**：部分旧版本程序可能存在通信 Bug 或对特定模块兼容性差。尝试升级主板程序至最新版本。 ### 4. 干扰排查 * **接地**：确保充电桩、模块外壳、CAN 线屏蔽层均良好接地。 * **布线**：CAN 通信线应尽量远离大功率交流线和直流输出线，避免平行走线，以减少电磁干扰。 ### 5. 硬件故障判断 * **替换法**： * 如果只有一个模块报 E048，尝试将该模块换到另一个已知正常的插槽，或更换一个正常模块测试，以判断是模块坏还是主板接口/线路问题。 * 如果所有模块都报 E048，重点检查主板 CAN 接口、主干线路及主板程序。 --- **总结排查顺序：** 1. **查接线**（手拉手/终端电阻/屏蔽接地） -> 2. **查供电**（模块是否通电） -> 3. **对协议**（主板设置与模块品牌匹配） -> 4. **抗干扰**（接地/布线） -> 5. **换模块/升程序**。 如果您能提供**模块品牌型号**（如英飞源、华为、中兴等）和**主板型号**，我可以为您提供更具体的协议设置建议。"
